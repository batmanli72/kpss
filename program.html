<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ders Programı Hazırlama</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Custom page-specific styling */
    .planner-section {
      width: 100%;
      max-width: 800px;
      margin-bottom: 2rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 2rem;
      backdrop-filter: blur(12px);
    }
    
    .subject-group {
      margin-bottom: 1.5rem;
    }
    
    .subject-title {
      font-size: 1.1rem;
      color: #a5b4fc;
      margin-bottom: 0.75rem;
      font-weight: 600;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 0.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .subject-title button {
      background: none;
      border: none;
      color: var(--primary);
      font-size: 0.85rem;
      cursor: pointer;
      width: auto;
      padding: 0;
      box-shadow: none;
    }

    .subject-title button:hover {
      text-decoration: underline;
      transform: none;
      box-shadow: none;
    }
    
    .topics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.5rem;
    }
    
    .topic-checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      padding: 0.4rem 0.6rem;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.03);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .topic-checkbox-label:hover {
      background: rgba(255,255,255,0.05);
    }
    
    .days-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    
    .day-btn {
      flex: 1;
      min-width: 60px;
      padding: 0.5rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      text-align: center;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    .day-btn.selected {
      background: var(--primary);
      border-color: var(--primary);
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
    }
    
    .program-output {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    
    .day-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1rem 1.5rem;
    }
    
    .day-card-header {
      font-size: 1.1rem;
      font-weight: 600;
      color: #a5b4fc;
      margin-bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
    }
    
    .day-card-topics {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    
    .day-card-topic-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem;
      background: rgba(0,0,0,0.15);
      border-radius: 6px;
      font-size: 0.9rem;
    }
    
    .info-badge {
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      padding: 1rem;
      border-radius: 12px;
      margin-bottom: 1.5rem;
      color: #cbd5e1;
    }
    
    .info-badge h4 {
      color: #a5b4fc;
      margin-bottom: 0.25rem;
    }

    .action-row {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .action-row button {
      flex: 1;
    }

    .completed-strike {
      text-decoration: line-through;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="header">
    <button onclick="goTo('home.html')">🏠 Ana Sayfa</button>
    <button onclick="goTo('dersler.html')">📚 Ders Takibi</button>
  </div>

  <h2>Haftalık Ders Programı Hazırlayıcı</h2>

  <div class="planner-section">
    <div id="countdown-info" class="info-badge">
      Yükleniyor...
    </div>

    <h3>Adım 1: Çalışmak İstediğiniz Konuları Seçin</h3>
    <div style="margin: 1rem 0; display: flex; gap: 0.5rem;">
      <button onclick="selectAllTopics(true)" style="width: auto; padding: 0.5rem 1rem; font-size: 0.85rem;">Tümünü Seç</button>
      <button onclick="selectAllTopics(false)" style="width: auto; padding: 0.5rem 1rem; font-size: 0.85rem; background: #374151;">Temizle</button>
    </div>
    
    <div id="topics-selection-container"></div>
  </div>

  <div class="planner-section">
    <h3>Adım 2: Haftalık Çalışma Düzeninizi Belirleyin</h3>
    
    <div style="margin-top: 1.5rem;">
      <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Hangi günler çalışacaksınız?</label>
      <div class="days-selector" id="days-selector">
        <div class="day-btn" data-day="Pazartesi" onclick="toggleDay(this)">Pzt</div>
        <div class="day-btn" data-day="Salı" onclick="toggleDay(this)">Sal</div>
        <div class="day-btn" data-day="Çarşamba" onclick="toggleDay(this)">Çar</div>
        <div class="day-btn" data-day="Perşembe" onclick="toggleDay(this)">Per</div>
        <div class="day-btn" data-day="Cuma" onclick="toggleDay(this)">Cum</div>
        <div class="day-btn" data-day="Cumartesi" onclick="toggleDay(this)">Cmt</div>
        <div class="day-btn" data-day="Pazar" onclick="toggleDay(this)">Paz</div>
      </div>
    </div>

    <div style="margin-top: 1.5rem;">
      <label for="hours-per-day" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Günlük hedef çalışma süresi (saat):</label>
      <input type="number" id="hours-per-day" min="1" max="12" value="3" style="width: 80px; padding: 0.5rem; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; text-align: center;">
    </div>

    <div class="action-row">
      <button onclick="generateProgram()">📅 Haftalık Program Oluştur</button>
    </div>
  </div>

  <div class="planner-section" id="program-result-section" style="display: none;">
    <h3>Kişiselleştirilmiş Haftalık Ders Programınız</h3>
    <div id="program-stats" class="info-badge" style="margin-top: 1rem;"></div>
    
    <div class="program-output" id="program-output"></div>
    
    <div class="action-row" style="margin-top: 2rem;">
      <button onclick="saveProgram()" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">💾 Programı Kaydet</button>
      <button onclick="window.print()" style="background: #475569;">🖨️ Programı Yazdır</button>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
  <script src="planner.js"></script>
</body>
</html>
